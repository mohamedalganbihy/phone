<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المهام والتركيبات</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-body: #0a0e17; --card-bg: #1a1d24; --border-color: #2a2e38; --text-light: #eef2ff; }
        body { background-color: var(--bg-body); color: var(--text-light); font-family: 'Segoe UI', system-ui; }
        .brand-header { background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%); color: white; padding: 15px; border-radius: 0 0 20px 20px; }
        .custom-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 15px; padding: 20px; }
        .nav-link-custom { color: var(--text-light); padding: 12px 20px; border-radius: 10px; display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .nav-link-custom:hover, .nav-link-custom.active { background-color: #9b59b6; color: white; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="brand-header d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-outline-light" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu"><i class="fas fa-bars"></i></button>
            <h4 class="m-0 fw-bold"><i class="fas fa-tools me-2"></i> إدارة تركيبات الدش والمهام الخارجية</h4>
        </div>
        <a href="index.html" class="btn btn-dark btn-sm"><i class="fas fa-home"></i> الرئيسية</a>
    </div>

    <div class="row g-3">
        <div class="col-md-4">
            <div class="custom-card">
                <h5>تسجيل مهمة عمل جديد</h5>
                <form id="taskForm">
                    <input type="text" id="taskDesc" class="form-control mb-2 bg-dark text-light border-secondary" placeholder="تفاصيل التركيب / العميل" required>
                    <button type="submit" class="btn btn-primary w-100" style="background-color: #9b59b6; border: none;">حفظ المهمة</button>
                </form>
            </div>
        </div>
        <div class="col-md-8">
            <div class="custom-card">
                <h5>قائمة المهام الحالية</h5>
                <div id="tasksContainer" class="d-flex flex-column gap-2"></div>
            </div>
        </div>
    </div>
</div>

<div class="offcanvas offcanvas-start bg-dark text-light" tabindex="-1" id="sidebarMenu" style="width: 280px;">
    <div class="offcanvas-header border-bottom border-secondary">
        <h5 class="offcanvas-title fw-bold" style="color: #9b59b6;"><i class="fas fa-th-large me-2"></i> قوائم النظام</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column gap-2 p-3">
        <a href="index.html" class="nav-link-custom"><i class="fas fa-chart-line"></i> لوحة الإحصائيات العامة</a>
        <a href="debts.html" class="nav-link-custom"><i class="fas fa-money-bill-wave"></i> إدارة الديون والحسابات</a>
        <a href="orders.html" class="nav-link-custom"><i class="fas fa-shopping-cart"></i> دفتر النواقص والطلبيات</a>
        <a href="inventory.html" class="nav-link-custom"><i class="fas fa-barcode"></i> المخزن والمبيعات</a>
        <a href="tasks.html" class="nav-link-custom active"><i class="fas fa-tools"></i> إدارة المهام والتركيبات</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "https://ganbihi-sys-default-rtdb.firebaseio.com/task_data/tasks.json";

    document.getElementById('taskForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const desc = document.getElementById('taskDesc').value;
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ desc, status: 'نشط' }) });
        document.getElementById('taskForm').reset();
        loadTasks();
    });

    async function loadTasks() {
        const res = await fetch(API_URL);
        const data = await res.json();
        const container = document.getElementById('tasksContainer');
        container.innerHTML = "";
        if(data) {
            Object.keys(data).forEach(key => {
                container.innerHTML += `<div class="p-2 border border-secondary rounded d-flex justify-content-between align-items-center bg-dark">${data[key].desc} <button class="btn btn-sm btn-danger" onclick="finishTask('${key}')">تم الانتهاء</button></div>`;
            });
        }
    }
    async function finishTask(key) {
        await fetch(`https://ganbihi-sys-default-rtdb.firebaseio.com/task_data/tasks/${key}.json`, { method: 'DELETE' });
        loadTasks();
    }
    loadTasks();
</script>
</body>
</html>
