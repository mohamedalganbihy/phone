<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المخزن والمبيعات</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-body: #0a0e17; --card-bg: #1a1d24; --border-color: #2a2e38; --text-light: #eef2ff; }
        body { background-color: var(--bg-body); color: var(--text-light); font-family: 'Segoe UI', system-ui; }
        .brand-header { background: linear-gradient(135deg, #2ecc71 0%, #26de81) !important; color: white; padding: 15px; border-radius: 0 0 20px 20px; }
        .custom-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 15px; padding: 20px; }
        .nav-link-custom { color: var(--text-light); padding: 12px 20px; border-radius: 10px; display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .nav-link-custom:hover, .nav-link-custom.active { background-color: #2ecc71; color: white; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="brand-header d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-outline-light" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu"><i class="fas fa-bars"></i></button>
            <h4 class="m-0 fw-bold"><i class="fas fa-boxes me-2"></i> إدارة بضاعة وجرد المخزن</h4>
        </div>
        <a href="index.html" class="btn btn-dark btn-sm"><i class="fas fa-home"></i> الرئيسية</a>
    </div>

    <div class="row g-3">
        <div class="col-md-4">
            <div class="custom-card">
                <h5>إدخال صنف بضاعة</h5>
                <form id="inventoryForm">
                    <input type="text" id="itemName" class="form-control mb-2 bg-dark text-light border-secondary" placeholder="اسم المنتج / القطعة" required>
                    <input type="number" id="itemQty" class="form-control mb-2 bg-dark text-light border-secondary" placeholder="الكمية" required>
                    <button type="submit" class="btn btn-success w-100">إضافة للمخزن</button>
                </form>
            </div>
        </div>
        <div class="col-md-8">
            <div class="custom-card">
                <h5>الأصناف الحالية</h5>
                <table class="table text-light">
                    <thead><tr><th>الصنف</th><th>الكمية المتوفرة</th></tr></thead>
                    <tbody id="inventoryTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="offcanvas offcanvas-start bg-dark text-light" tabindex="-1" id="sidebarMenu" style="width: 280px;">
    <div class="offcanvas-header border-bottom border-secondary">
        <h5 class="offcanvas-title fw-bold text-success"><i class="fas fa-th-large me-2"></i> قوائم النظام</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column gap-2 p-3">
        <a href="index.html" class="nav-link-custom"><i class="fas fa-chart-line"></i> لوحة الإحصائيات العامة</a>
        <a href="debts.html" class="nav-link-custom"><i class="fas fa-money-bill-wave"></i> إدارة الديون والحسابات</a>
        <a href="orders.html" class="nav-link-custom"><i class="fas fa-shopping-cart"></i> دفتر النواقص والطلبيات</a>
        <a href="inventory.html" class="nav-link-custom active"><i class="fas fa-barcode"></i> المخزن والمبيعات</a>
        <a href="tasks.html" class="nav-link-custom"><i class="fas fa-tools"></i> إدارة المهام والتركيبات</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "https://ganbihi-sys-default-rtdb.firebaseio.com/inventory_data/inventory.json";

    document.getElementById('inventoryForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('itemName').value;
        const quantity = document.getElementById('itemQty').value;
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ name, quantity }) });
        document.getElementById('inventoryForm').reset();
        loadInventory();
    });

    async function loadInventory() {
        const res = await fetch(API_URL);
        const data = await res.json();
        const tbody = document.getElementById('inventoryTable');
        tbody.innerHTML = "";
        if(data) {
            Object.keys(data).forEach(key => {
                tbody.innerHTML += `<tr><td>${data[key].name}</td><td class="text-success fw-bold">${data[key].quantity} قطع</td></tr>`;
            });
        }
    }
    loadInventory();
</script>
</body>
</html>
