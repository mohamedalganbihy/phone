<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المحل - اللوحة الرئيسية</title>
    <link rel="stylesheet" href="style.css">
    <!-- مكتبة FontAwesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <!-- القائمة الجانبية الثابتة -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3><i class="fa-solid fa-shop"></i> لوحة التحكم</h3>
            </div>
            <ul class="nav-links">
                <li class="active"><a href="index.html"><i class="fa-solid fa-chart-line"></i> الإحصائيات</a></li>
                <li><a href="repairs.html"><i class="fa-solid fa-wrench"></i> الصيانة</a></li>
                <li><a href="inventory.html"><i class="fa-solid fa-boxes-stacked"></i> المخزن</a></li>
                <li><a href="sales.html"><i class="fa-solid fa-cart-shopping"></i> المبيعات</a></li>
            </ul>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="main-content">
            <header class="top-header">
                <button class="toggle-btn" id="toggleSidebar"><i class="fa-solid fa-bars"></i></button>
                <h2>الإحصائيات العامة للمحل</h2>
            </header>

            <!-- بطاقات الإحصائيات -->
            <section class="stats-grid">
                <div class="stat-card blue">
                    <div class="stat-icon"><i class="fa-solid fa-hourglass-half"></i></div>
                    <div class="stat-info">
                        <h3 id="pending-repairs">0</h3>
                        <p>أجهزة قيد الصيانة</p>
                    </div>
                </div>

                <div class="stat-card green">
                    <div class="stat-icon"><i class="fa-solid fa-check-double"></i></div>
                    <div class="stat-info">
                        <h3 id="completed-repairs">0</h3>
                        <p>أجهزة تم تسليمها</p>
                    </div>
                </div>

                <div class="stat-card orange">
                    <div class="stat-icon"><i class="fa-solid fa-box"></i></div>
                    <div class="stat-info">
                        <h3 id="low-stock">0</h3>
                        <p>نواقص المخزن (أقل من 3)</p>
                    </div>
                </div>

                <div class="stat-card purple">
                    <div class="stat-icon"><i class="fa-solid fa-money-bill-wave"></i></div>
                    <div class="stat-info">
                        <h3 id="today-sales">0 ج.م</h3>
                        <p>أرباح ومبيعات اليوم</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- كود الجافاسكريبت لجلب الإحصائيات وتحريك القائمة -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ضع هنا بيانات الفايربيز الخاصة بك (Firebase Configuration)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- 1. تشغيل وتحريك القائمة الجانبية ---
        const sidebar = document.getElementById('sidebar');
        const toggleSidebar = document.getElementById('toggleSidebar');
        toggleSidebar.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });

        // --- 2. جلب حسابات الإحصائيات من Firebase تلقائياً ---
        
        // أ. إحصائيات الصيانة
        onValue(ref(db, 'repairs'), (snapshot) => {
            let pending = 0;
            let completed = 0;
            snapshot.forEach((childSnapshot) => {
                const repair = childSnapshot.val();
                if(repair.status === 'قيد الانتظار' || repair.status === 'جاري العمل') pending++;
                if(repair.status === 'تم التسليم') completed++;
            });
            document.getElementById('pending-repairs').innerText = pending;
            document.getElementById('completed-repairs').innerText = completed;
        });

        // ب. إحصائيات المخزن والنواقص
        onValue(ref(db, 'inventory'), (snapshot) => {
            let lowStockCount = 0;
            snapshot.forEach((childSnapshot) => {
                const item = childSnapshot.val();
                if(parseInt(item.quantity) <= 3) lowStockCount++; // تنبيه لو الكمية 3 أو أقل
            });
            document.getElementById('low-stock').innerText = lowStockCount;
        });

        // ج. إحصائيات مبيعات اليوم
        onValue(ref(db, 'sales'), (snapshot) => {
            let todayTotal = 0;
            const todayStr = new Date().toISOString().split('T')[0]; // تاريخ اليوم الحالي YYYY-MM-DD
            
            snapshot.forEach((childSnapshot) => {
                const sale = childSnapshot.val();
                if(sale.date === todayStr) {
                    todayTotal += parseFloat(sale.totalPrice || 0);
                }
            });
            document.getElementById('today-sales').innerText = todayTotal + " ج.م";
        });
    </script>
</body>
</html>
