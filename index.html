<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اللوحة الرئيسية - الإحصائيات العامّة</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- القائمة الجانبية -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3><i class="fa-solid fa-bolt"></i> نظام المحل الموحد</h3>
        </div>
        <ul class="nav-links">
            <li class="active"><a href="index.html"><i class="fa-solid fa-chart-pie"></i> الإحصائيات العامة</a></li>
            <li><a href="repairs.html"><i class="fa-solid fa-screwdriver-wrench"></i> قسم الصيانة</a></li>
            <li><a href="inventory.html"><i class="fa-solid fa-warehouse"></i> إدارة المخزن</a></li>
            <li><a href="sales.html"><i class="fa-solid fa-cash-register"></i> المبيعات والخدمات</a></li>
        </ul>
    </aside>

    <!-- المحتوى الرئيسي -->
    <main class="main-content">
        <header class="top-header">
            <button class="toggle-btn" id="toggleSidebar"><i class="fa-solid fa-bars"></i></button>
            <h2>نظرة عامة على نشاط المحل اليوم</h2>
        </header>

        <section class="stats-grid">
            <div class="stat-card blue">
                <div class="stat-info"><h3 id="pending-repairs">0</h3><p>أجهزة قيد الصيانة حالياً</p></div>
                <div class="stat-icon"><i class="fa-solid fa-hourglass-half"></i></div>
            </div>
            <div class="stat-card green">
                <div class="stat-info"><h3 id="completed-repairs">0</h3><p>أجهزة تم تسليمها بنجاح</p></div>
                <div class="stat-icon"><i class="fa-solid fa-circle-check"></i></div>
            </div>
            <div class="stat-card orange">
                <div class="stat-info"><h3 id="low-stock">0</h3><p>نواقص في المخزن (أقل من 3 قطع)</p></div>
                <div class="stat-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
            </div>
            <div class="stat-card purple">
                <div class="stat-info"><h3 id="today-sales">0 ج.م</h3><p>مبيعات وإيرادات اليوم</p></div>
                <div class="stat-icon"><i class="fa-solid fa-wallet"></i></div>
            </div>
        </section>
    </main>

    <script type="module">
        import { db, ref, onValue } from "./firebase-config.js";

        // تشغيل القائمة الجانبية للموبايل
        const sidebar = document.getElementById('sidebar');
        document.getElementById('toggleSidebar').addEventListener('click', () => sidebar.classList.toggle('active'));

        // حساب إحصائيات الصيانة
        onValue(ref(db, 'repairs'), (snapshot) => {
            let pending = 0, completed = 0;
            snapshot.forEach((child) => {
                const val = child.val();
                if(val.status === 'قيد الانتظار' || val.status === 'جاري العمل') pending++;
                if(val.status === 'تم التسليم') completed++;
            });
            document.getElementById('pending-repairs').innerText = pending;
            document.getElementById('completed-repairs').innerText = completed;
        });

        // حساب نواقص المخزن
        onValue(ref(db, 'inventory'), (snapshot) => {
            let low = 0;
            snapshot.forEach((child) => {
                if(parseInt(child.val().quantity || 0) <= 3) low++;
            });
            document.getElementById('low-stock').innerText = low;
        });

        // حساب مبيعات اليوم
        onValue(ref(db, 'sales'), (snapshot) => {
            let total = 0;
            const today = new Date().toISOString().split('T')[0];
            snapshot.forEach((child) => {
                const sale = child.val();
                if(sale.date === today) total += parseFloat(sale.amount || 0);
            });
            document.getElementById('today-sales').innerText = total + " ج.م";
        });
    </script>
</body>
</html>
